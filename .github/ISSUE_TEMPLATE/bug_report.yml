name: Bug report
description: Report a reproducible bug in the SDK, docs, tests, or examples.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for reporting an issue. Please include enough detail for someone else to reproduce it without guessing.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the behavior you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include code snippets, payloads, or steps to reproduce the issue.
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 22.12.0
    validations:
      required: true
  - type: input
    id: sdk
    attributes:
      label: SDK version
      placeholder: e.g. 1.2.0
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Mention the Daraja product, environment, and any relevant logs with secrets removed.
