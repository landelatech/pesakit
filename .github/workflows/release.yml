name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Verify tag matches package version
        run: node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); const tag=process.env.GITHUB_REF_NAME; const expected='v'+pkg.version; if (tag !== expected) { throw new Error('Release tag '+tag+' does not match package version '+expected); }"

      - name: Run quality gates
        run: yarn ci:check

      - name: Pack npm artifact
        run: |
          mkdir -p .release
          npm pack --json --pack-destination .release > .release/pack.json

      - name: Verify publish tarball
        run: npm publish --dry-run --access public .release/*.tgz

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: |
            .release/*.tgz
            .release/pack.json
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v7
        with:
          name: npm-package
          path: .release

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: npm publish --access public .release/*.tgz

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: .release/*.tgz
